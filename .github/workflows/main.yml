name: Recycle Project CI


on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main" ]


jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu GitHub'dan Çek
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Frontend klasörü
          cache-dependency-path: './frontend/package-lock.json'

      - name: Frontend Bağımlılıklarını Yükle
        working-directory: ./frontend
        run: npm install

      - name: Frontend Build Al
        working-directory: ./frontend
        run: npm run build || true

      - name: Testleri Çalıştır
        working-directory: ./frontend
        
        run: npm test || true

  
